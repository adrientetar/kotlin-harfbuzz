name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-native:
    strategy:
      matrix:
        include:
          - os: macos-latest       # Apple Silicon runner
            classifier: macos-arm64
            lib-name: libharfbuzz.dylib
          - os: macos-15-intel     # Intel runner
            classifier: macos-x64
            lib-name: libharfbuzz.dylib
          - os: ubuntu-latest
            classifier: linux-x64
            lib-name: libharfbuzz.so
          - os: ubuntu-24.04-arm
            classifier: linux-arm64
            lib-name: libharfbuzz.so
          - os: windows-latest
            classifier: windows-x64
            lib-name: harfbuzz.dll
          - os: windows-11-arm
            classifier: windows-arm64
            lib-name: harfbuzz.dll

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install meson and ninja (Windows)
        if: runner.os == 'Windows'
        run: pip install meson ninja

      - name: Install meson and ninja (macOS)
        if: runner.os == 'macOS'
        run: brew install meson ninja

      - name: Install meson and ninja (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y meson ninja-build

      - name: Build HarfBuzz (Windows, MSVC)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          meson setup build harfbuzz -Dglib=disabled -Dgobject=disabled -Dcairo=disabled -Dfreetype=disabled -Dicu=disabled --default-library=shared --vsenv
          meson compile -C build

      - name: Build HarfBuzz (macOS/Linux)
        if: runner.os != 'Windows'
        run: |
          meson setup build harfbuzz \
            -Dglib=disabled \
            -Dgobject=disabled \
            -Dcairo=disabled \
            -Dfreetype=disabled \
            -Dicu=disabled \
            --default-library=shared
          meson compile -C build

      - name: Upload native library
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.classifier }}
          path: build/src/${{ matrix.lib-name }}
          retention-days: 1

  publish:
    runs-on: ubuntu-latest
    needs: [build-native]

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Download all native libraries
        uses: actions/download-artifact@v4
        with:
          pattern: native-*
          path: native-libs/

      - name: Prepare native libraries for publishing
        run: |
          mkdir -p build/native
          for dir in native-libs/native-*; do
            classifier=$(basename "$dir" | sed 's/native-//')
            mkdir -p "build/native/$classifier"
            cp "$dir"/* "build/native/$classifier/"
          done
          ls -la build/native/*/

      - name: Build base JAR
        run: |
          ./gradlew jar sourcesJar plainJavadocJar -Prelease \
            -x buildHarfBuzz \
            -x copyNativeLibrary \
            -x copyNativeLibraryForTest

      - name: Publish to Maven Central
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.GPG_SIGNING_PASSWORD }}
        run: |
          ./gradlew publishToMavenCentral --no-configuration-cache -Prelease \
            -x buildHarfBuzz \
            -x copyNativeLibrary \
            -x copyNativeLibraryForTest

  create-release:
    runs-on: ubuntu-latest
    needs: [publish]
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
