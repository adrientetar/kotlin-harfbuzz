name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    strategy:
      matrix:
        include:
          - os: macos-latest      # Apple Silicon
            lib-name: libharfbuzz.dylib
          - os: macos-15-intel    # Intel
            lib-name: libharfbuzz.dylib
          - os: ubuntu-latest
            lib-name: libharfbuzz.so
          - os: windows-latest
            lib-name: harfbuzz.dll

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install meson and ninja (macOS)
        if: runner.os == 'macOS'
        run: brew install meson ninja

      - name: Install meson and ninja (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y meson ninja-build

      - name: Install meson and ninja (Windows)
        if: runner.os == 'Windows'
        run: pip install meson ninja

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build and test
        run: ./gradlew build test

      - name: Debug - List built libraries
        if: always()
        run: ls -la build/harfbuzz-build/src/ || dir build\harfbuzz-build\src\
        shell: bash

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-results-${{ matrix.os }}
          path: build/reports/tests/
